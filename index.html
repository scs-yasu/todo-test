<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODO App</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --primary: #2563eb;
      --danger: #dc2626;
      --danger-soft: #fee2e2;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(160deg, #f8fafc 0%, #eef2ff 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(680px, 100%);
      background: var(--panel);
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 24px;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 1.8rem;
      text-align: center;
      letter-spacing: 0.03em;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr 170px 96px;
      gap: 10px;
      margin-bottom: 18px;
    }

    input[type="text"],
    input[type="date"],
    button {
      height: 42px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
    }

    input[type="text"],
    input[type="date"] {
      padding: 0 12px;
      color: var(--text);
      background: #fff;
    }

    input[type="text"]:focus,
    input[type="date"]:focus,
    button:focus-visible {
      outline: 2px solid #bfdbfe;
      outline-offset: 1px;
    }

    #add-button {
      background: var(--primary);
      color: #fff;
      border: 1px solid var(--primary);
      font-weight: 600;
      cursor: pointer;
    }

    #add-button:hover {
      filter: brightness(0.95);
    }

    ul {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .task-item {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      background: #fff;
    }

    .task-item.overdue {
      border-color: #fca5a5;
      background: var(--danger-soft);
    }

    .task-main {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .task-text {
      font-size: 1rem;
      overflow-wrap: anywhere;
    }

    .task-meta {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .task-meta.overdue {
      color: var(--danger);
      font-weight: 600;
    }

    .task-item.completed .task-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .delete-btn {
      background: transparent;
      color: var(--danger);
      border: 1px solid #fecaca;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      font-size: 1.1rem;
      line-height: 1;
      cursor: pointer;
    }

    .delete-btn:hover {
      background: #fee2e2;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 28px 8px;
      border: 1px dashed #d1d5db;
      border-radius: 12px;
      background: #fafafa;
    }

    @media (max-width: 620px) {
      .input-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>TODO App</h1>
    <form id="task-form" class="input-row">
      <input id="task-input" type="text" placeholder="Add a new task..." autocomplete="off" />
      <input id="due-date-input" type="date" />
      <button id="add-button" type="submit">Add</button>
    </form>
    <ul id="task-list"></ul>
    <p id="empty-message" class="empty">No tasks yet. Add your first task.</p>
  </main>

  <script>
    const STORAGE_KEY = "todo-app-tasks";

    /** @type {{id:number,text:string,completed:boolean,dueDate:string|null}[]} */
    let tasks = [];

    const form = document.getElementById("task-form");
    const taskInput = document.getElementById("task-input");
    const dueDateInput = document.getElementById("due-date-input");
    const taskList = document.getElementById("task-list");
    const emptyMessage = document.getElementById("empty-message");

    function loadTasks() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return;
        tasks = parsed.filter((task) => task && typeof task.id === "number" && typeof task.text === "string");
      } catch (error) {
        console.error("Failed to load tasks from localStorage:", error);
      }
    }

    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function isOverdue(task) {
      if (!task.dueDate || task.completed) return false;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const due = new Date(task.dueDate + "T00:00:00");
      return due < today;
    }

    function formatDueDate(dateString) {
      if (!dateString) return "";
      const date = new Date(dateString + "T00:00:00");
      return date.toLocaleDateString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric"
      });
    }

    function renderTasks() {
      taskList.innerHTML = "";

      tasks.forEach((task) => {
        const overdue = isOverdue(task);
        const li = document.createElement("li");
        li.className = "task-item";
        if (task.completed) li.classList.add("completed");
        if (overdue) li.classList.add("overdue");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = task.completed;
        checkbox.setAttribute("aria-label", "Toggle task completion");
        checkbox.addEventListener("change", () => {
          toggleTask(task.id);
        });

        const main = document.createElement("div");
        main.className = "task-main";

        const text = document.createElement("span");
        text.className = "task-text";
        text.textContent = task.text;
        main.appendChild(text);

        if (task.dueDate) {
          const meta = document.createElement("span");
          meta.className = "task-meta";
          if (overdue) meta.classList.add("overdue");
          meta.textContent = "Due: " + formatDueDate(task.dueDate);
          main.appendChild(meta);
        }

        const deleteButton = document.createElement("button");
        deleteButton.className = "delete-btn";
        deleteButton.type = "button";
        deleteButton.setAttribute("aria-label", "Delete task");
        deleteButton.textContent = "x";
        deleteButton.addEventListener("click", () => {
          deleteTask(task.id);
        });

        li.appendChild(checkbox);
        li.appendChild(main);
        li.appendChild(deleteButton);
        taskList.appendChild(li);
      });

      emptyMessage.style.display = tasks.length === 0 ? "block" : "none";
    }

    function addTask(text, dueDate) {
      const trimmed = text.trim();
      if (!trimmed) return;
      const newTask = {
        id: Date.now(),
        text: trimmed,
        completed: false,
        dueDate: dueDate || null
      };

      tasks.unshift(newTask); // Newest first
      saveTasks();
      renderTasks();
    }

    function toggleTask(id) {
      tasks = tasks.map((task) => {
        if (task.id !== id) return task;
        return { ...task, completed: !task.completed };
      });
      saveTasks();
      renderTasks();
    }

    function deleteTask(id) {
      tasks = tasks.filter((task) => task.id !== id);
      saveTasks();
      renderTasks();
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      addTask(taskInput.value, dueDateInput.value);
      taskInput.value = "";
      dueDateInput.value = "";
      taskInput.focus();
    });

    loadTasks();
    renderTasks();
  </script>
</body>
</html>
